version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "Monban"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'

env:
  CGO_CFLAGS: "-I/opt/homebrew/include"
  CGO_LDFLAGS: "-L/opt/homebrew/lib -lfido2"

tasks:
  test:
    summary: Runs all tests
    cmds:
      - go test ./internal/monban/ -v
      - go test ./internal/app/ -v

  lint:
    summary: Runs all linters
    cmds:
      - golangci-lint run ./...
      - cd frontend && bun run lint

  lint:go:
    summary: Runs Go linter
    cmds:
      - golangci-lint run ./...

  lint:frontend:
    summary: Runs frontend linter
    cmds:
      - cd frontend && bun run lint

  bindings:
    summary: Generates Wails frontend bindings from Go services
    cmds:
      - wails3 generate bindings

  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  package:dev:
    summary: Packages a production-tagged build with desktop/prod-release.pub baked in (local testing)
    cmds:
      - task: "{{OS}}:package:dev"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  dev:
    summary: Runs the application in development mode
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  dev:prodkey:
    summary: Runs the app from source with the production plugin pubkey injected
    desc: |
      Same as `task dev` but bakes prod-release.pub into the binary so it
      trusts plugin artefacts signed in CI with MONBAN_PLUGIN_SIGNING_KEY.
      Used to reproduce the real install flow against live GitHub releases.
    preconditions:
      - sh: '[ -f prod-release.pub ]'
        msg: "desktop/prod-release.pub missing — generate with `./bin/monban-sign generate-key`"
    cmds:
      - go run -ldflags "-X monban/internal/plugin.ReleasePubKeyHex=$(cat prod-release.pub)" .

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  build:server:
    summary: Builds the application in server mode (no GUI, HTTP server only)
    cmds:
      - task: common:build:server

  run:server:
    summary: Runs the application in server mode
    cmds:
      - task: common:run:server

  release:test:
    summary: Pushes a release candidate tag to test the release workflow
    vars:
      VERSION: '{{.VERSION | default "0.0.1-rc1"}}'
    cmds:
      - git tag v{{.VERSION}}
      - git push origin v{{.VERSION}}

  release:test:cleanup:
    summary: Deletes a release candidate tag and its GitHub release
    vars:
      VERSION: '{{.VERSION | default "0.0.1-rc1"}}'
    cmds:
      - gh release delete v{{.VERSION}} --yes 2>/dev/null || true
      - git push origin --delete v{{.VERSION}} 2>/dev/null || true
      - git tag -d v{{.VERSION}} 2>/dev/null || true

  release:
    summary: Creates a new release by tagging and pushing
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required. Usage: task release VERSION=1.0.0"
    cmds:
      - git tag v{{.VERSION}}
      - git push origin v{{.VERSION}}

  plugin:release:
    summary: Cuts a plugin-store release by pushing a plugins-v<version> tag
    preconditions:
      - sh: '[ -n "{{.VERSION}}" ]'
        msg: "VERSION is required. Usage: task plugin:release VERSION=0.1.0"
    cmds:
      - git tag plugins-v{{.VERSION}}
      - git push origin plugins-v{{.VERSION}}

  plugin:release:test:
    summary: Pushes a plugins-v<version> release candidate tag to test the plugin workflow
    vars:
      VERSION: '{{.VERSION | default "0.0.1-rc1"}}'
    cmds:
      - git tag plugins-v{{.VERSION}}
      - git push origin plugins-v{{.VERSION}}

  plugin:release:test:cleanup:
    summary: Deletes a plugins-v<version> candidate tag and its GitHub release
    vars:
      VERSION: '{{.VERSION | default "0.0.1-rc1"}}'
    cmds:
      - gh release delete plugins-v{{.VERSION}} --yes 2>/dev/null || true
      - git push origin --delete plugins-v{{.VERSION}} 2>/dev/null || true
      - git tag -d plugins-v{{.VERSION}} 2>/dev/null || true

  build:docker:
    summary: Builds a Docker image for server mode deployment
    cmds:
      - task: common:build:docker

  run:docker:
    summary: Builds and runs the Docker image
    cmds:
      - task: common:run:docker
