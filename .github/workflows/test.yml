name: lint and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  GITHUB_TOKEN: ${{ secrets.GH_PAT }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --cwd desktop/frontend

      - name: Lint
        run: bun run --cwd desktop/frontend lint

  go-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfido2-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: desktop/frontend
        run: |
          bun install
          bun run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: desktop

  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfido2-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Run tests
        run: go test ./internal/monban/ -v
